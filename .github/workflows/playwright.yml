name: Playwright E2E Tests

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-playwright
  cancel-in-progress: true

jobs:
  playwright-e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        streamlit: ["1.53.0", "latest"]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          fetch-depth: 2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "streamlit_echarts/frontend/package-lock.json"

      - name: Build frontend
        run: |
          cd streamlit_echarts/frontend
          npm ci --legacy-peer-deps
          npm run build

      - name: Create Python environment cache key
        run: |
          md5sum $(which python) > $GITHUB_WORKSPACE/python_cache_key.md5
          md5sum e2e_playwright/test-requirements.txt >> $GITHUB_WORKSPACE/python_cache_key.md5
          md5sum pyproject.toml >> $GITHUB_WORKSPACE/python_cache_key.md5
          date +%F >> $GITHUB_WORKSPACE/python_cache_key.md5

      - name: Restore virtualenv from cache
        id: cache-virtualenv
        uses: actions/cache@v4
        with:
          path: venv
          key: v1-python-venv-${{ hashFiles('**/python_cache_key.md5') }}

      - name: Build and install the package
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install build
          python -m build
          pip install dist/*.whl

      - name: Install Python test dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r e2e_playwright/test-requirements.txt
          if [[ "${{ matrix.streamlit }}" == "latest" ]]; then
            pip install streamlit
          else
            pip install "streamlit==${{ matrix.streamlit }}"
          fi
          python -m playwright install --with-deps

      - name: Run Playwright tests
        run: |
          source venv/bin/activate
          pytest e2e_playwright -n auto --browser chromium --video retain-on-failure --screenshot only-on-failure

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.streamlit }}
          path: e2e_playwright/test-results
