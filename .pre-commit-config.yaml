repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$|\.pyi$
      - id: ruff-format
        files: \.py$|\.pyi$

  - repo: local
    hooks:
      - id: format-ts-js
        name: Format TS/JS files with prettier
        entry: bash -c 'cd streamlit_echarts/frontend && npx prettier --check "src/**/*.{ts,tsx}"'
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)
          ^streamlit_echarts/frontend/build/
      - id: check-added-large-files
        args: ["--maxkb=3072"]
        exclude: |
          (?x)
          ^streamlit_echarts/frontend/build/
